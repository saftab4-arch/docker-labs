services:

  web:
    image: nginx

    networks:
      - security-net

    volumes:
      - nginx-logs:/var/log/nginx

    expose:
      - "80"

  nginx-lb:
    image: nginx

    ports:
      - "8080:80"

    networks:
      - security-net

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-lb-logs:/var/log/nginx

  postgres:
    image: postgres
    container_name: postgres

    env_file:
      - postgres.env

    ports:
      - "5432:5432"

    networks:
      - security-net

    volumes:
      - postgres-data:/var/lib/postgresql

  audit-tool:
    image: ubuntu
    container_name: audit-tool

    command: sleep infinity

    networks:
      - security-net

    volumes:
      - audit-data:/reports

networks:

  security-net:
    external: true

volumes:

  postgres-data:
    external: true

  nginx-logs:
    external: true

  audit-data:
    external: true

  nginx-lb-logs:
    external: true
